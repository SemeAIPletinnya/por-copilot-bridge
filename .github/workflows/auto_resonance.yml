name: Auto Resonance

on:
  push:
  pull_request:

permissions:
  contents: read
  id-token: write
  attestations: write

jobs:
  auto-resonance:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Proof-of-Resonance Core
        run: echo "Running Proof-of-Resonance Core"

      - name: Run Resonant Stability Field
        run: echo "Running Resonant Stability Field"

      - name: Prepare Provenance Subject
        run: |
          mkdir -p output
          cat > output/por-copilot-bridge-provenance.json <<'JSON'
          {
            "repo": "SemeAIPletinnya/por-copilot-bridge",
            "package": "por-copilot-bridge",
            "purpose": "Deterministic provenance subject for the lightweight release-governance bridge workflow."
          }
          JSON

      - name: Upload Resonance Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: resonance-artifacts
          path: output/**
          if-no-files-found: warn

      - name: Generate Build Provenance
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/attest-build-provenance@v1
        with:
          subject-path: output/**
